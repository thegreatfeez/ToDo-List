<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">To-Do List</h1>
    <!-- Input for new task -->
    <div class="flex mb-4">
      <input
        id="taskInput"
        type="text"
        class="flex-1 p-2 border border-gray-300 rounded-l-lg outline-none focus:ring-2 focus:ring-blue-400"
        placeholder="Add a new task..."
      >
      <button
        id="addTaskBtn"
        class="bg-blue-500 text-white px-4 py-2 rounded-r-lg hover:bg-blue-600 transition"
      >
        Add Button
      </button>
    </div>
    <!-- Task list -->
    <ul id="taskList" class="mb-4 space-y-2">
      <!-- Tasks will be rendered here -->
    </ul>
  </div>
  <script src="index.js" type="module"></script>
</body>
</html>
